edition: 3.0.0
name: daily-news-app
access: default-1

vars:
  region: cn-hangzhou

resources:
  daily-news:
    component: fc3
    props:
      region: ${vars.region}
      functionName: daily-news-nodejs18
      runtime: nodejs18
      cpu: 0.5
      memorySize: 1024
      diskSize: 512
      timeout: 120
      environmentVariables:
        BRAVE_API_KEY: your_brave_api_key_here
      handler: fc-handler.handler
      code: ./.next/standalone
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
      customDomains:
        - domainName: auto
          protocol: HTTP
          routeConfigs:
            - path: /*
